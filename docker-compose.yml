version: '3.8'

services:
  # Backend API service
  backend:
    image: ghcr.io/<your-username>/<your-repo-name>-backend:latest
    ports:
      - "8080:8080"
    restart: always

  # Frontend web service
  frontend:
    image: ghcr.io/<your-username>/<your-repo-name>-frontend:latest
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always